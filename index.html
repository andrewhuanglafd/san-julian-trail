  .boot-bar-pct{font-family:'Press Start 2P';font-size:9px;color:var(--green);text-align:right;padding:0 10px;letter-spacing:1px}

/* ===================== ROUTES ===================== */
/* Lincoln Heights (140 N Ave 19) → quarters (430 E 7th St) */
const ROUTES={
  main:{key:'main',name:"DOWN MAIN  ·  FAST + LOADED",sub:"N. Broadway → S. Main · ≈4.8 mi",

const EMPTY=[

/* ===================== SKILL PROCEDURES ===================== */
const PROC={
  opa:{name:"OROPHARYNGEAL AIRWAY",steps:[
    {q:"Before anything goes in the mouth, confirm:",qV:["Before anything goes in the mouth, confirm:","First check before insertion:","Indication check \u2014 is the OPA actually appropriate?"],teach:"An OPA is only for an UNRESPONSIVE patient with NO gag reflex. A gag = stop, it'll make them vomit.",
      o:[{l:"He's unresponsive with NO gag reflex.",ok:1},{l:"Eh, he looks pretty out of it.",ok:0},{l:"Lube it up first.",ok:0}]},
    {q:"Size it. Measure from:",qV:["Size it. Measure from:","How do you measure the OPA?","Pick the right size \u2014 your landmark is:"],teach:"Correct OPA size = corner of the mouth to the angle of the jaw (or earlobe). Too big = presses the epiglottis; too small = folds the tongue back.",
      o:[{l:"Corner of the mouth \u2192 angle of the jaw.",ok:1},{l:"Front teeth \u2192 the chin.",ok:0},{l:"Eyeball it, he's a big guy.",ok:0}]},
    {q:"Open the mouth to place it:",qV:["Open the mouth to place it:","Position step before insertion:","How do you get the mouth open?"],teach:"Open the mouth with a scissor (cross-finger) technique on the teeth, OR apply pressure on the chin with your thumb. NEVER force past clenched teeth \u2014 that's an absolute OPA contraindication.",

  ],rayExtra:[
    {q:"Ray insists you also:",qV:["Ray insists you also:","Before placement, Ray adds:","Ray's not done \u2014 he wants to:"],teach:"Always have suction set up BEFORE airway intervention. Vomit during placement is the failure mode \u2014 be ready.",
      o:[{l:"Have suction ready BEFORE you place it.",ok:1},{l:"Worry about suction only if he vomits.",ok:0},{l:"Skip suction \u2014 he's not actively vomiting.",ok:0}]},
    {q:"And before you call it done:",qV:["And before you call it done:","Ray's last check:","One more thing per Ray:"],teach:"Reassess airway and ventilations after placement. An OPA can dislodge, and a tube in the wrong place is worse than no tube at all.",

  ]},
  npa:{name:"NASOPHARYNGEAL AIRWAY",steps:[

    {q:"Size it:",qV:["Size it:","How do you measure the NPA?","Right size means measuring:"],teach:"Length = nostril to the earlobe. Diameter \u2248 the patient's pinky / the nare. Then pick the LARGEST nostril for insertion. Wrong size helps no one.",
      o:[{l:"Nostril \u2192 earlobe for length; pinky for width; largest nostril.",ok:1},{l:"Tip of nose \u2192 chin.",ok:0},{l:"Grab the fattest one you own.",ok:0}]},
    {q:"Prep:",qV:["Prep:","Before it goes in:","Last prep step:"],teach:"Always lubricate with WATER-soluble lube. Dry insertion shreds the nasal mucosa and earns you a nosebleed. Oil-based lube is wrong \u2014 aspiration risk.",
      o:[{l:"Lubricate with water-soluble lube.",ok:1},{l:"Insert it dry, it's fine.",ok:0},{l:"Spit on it. Field expedient.",ok:0}]},
    {q:"Position and insert:",qV:["Position and insert:","Insertion technique:","How does the NPA actually go in?"],teach:"Push the tip of the nose UPWARD, head neutral. Pencil-grip near the flange, bevel toward the SEPTUM, advance straight back along the FLOOR of the nose (toward the ear, not up) until the flange seats. If it won't pass \u2014 switch sides. NEVER force.",
      o:[{l:"Nose tip up, pencil grip, bevel to septum, along the floor until flange seats.",ok:1},{l:"Push hard and twist it through.",ok:0},{l:"Aim it up toward the eyes.",ok:0}]}
  ],rayExtra:[
    {q:"Ray adds another check:",qV:["Ray adds another check:","Ray's not satisfied yet:","Per Ray's by-the-book brain:"],teach:"After insertion, reassess respirations and confirm the NPA hasn't backed out. NPAs can migrate \u2014 secure if you have to.",
      o:[{l:"Reassess respirations and adjunct seating after insertion.",ok:1},{l:"Tape and forget.",ok:0}]},
    {q:"And while you're at it:",qV:["And while you're at it:","One more, Ray says:","Ray's last word:"],teach:"Have suction ready for nasal bleeding \u2014 NPAs occasionally start one. Anticipate; don't react.",
      o:[{l:"Keep suction ready for bleeding.",ok:1},{l:"Suction only if a problem starts.",ok:0}]}
  ]},
  naloxone:{name:"NALOXONE / NARCAN",steps:[
    {q:"Confirm it's actually an opioid OD:",qV:["Confirm it's actually an opioid OD:","Indication check before the Narcan:","Recognize the OD picture first:"],teach:"Classic opioid OD triad: altered LOC + slow/shallow breathing + pinpoint pupils. All three lining up is your green light. (Also: ensure ALS is enroute.)",
      o:[{l:"Altered LOC, slow/shallow breathing, AND pinpoint pupils.",ok:1},{l:"He's just unresponsive \u2014 that's enough.",ok:0},{l:"Bystander said he uses. Good enough.",ok:0}]},
    {q:"Before the Narcan, the priority is:",qV:["Before the Narcan, the priority is:","Before you give naloxone, the first action is:","What comes FIRST?"],teach:"Opioid OD kills by stopping breathing. OPEN the airway and VENTILATE with a BVM on HIGH-FLOW O2 first \u2014 oxygen is the save, naloxone is the assist. (BLS routes: intranasal with atomizer, or IM per LA County protocol.)",
      o:[{l:"Open the airway, BVM with high-flow O2.",ok:1},{l:"Give the Narcan now, breathing can wait.",ok:0},{l:"Sternal rub until he wakes.",ok:0}]},
    {q:"State the med, dose, and route (adult):",qV:["State the med, dose, and route (adult):","Adult dose and route:","Med safety check \u2014 what are you giving?"],teach:"Adult IN: 2\u20134 mg (1 mg per nostril with the atomizer, or 4 mg/0.1 mL prefilled). Adult IM: 2 mg. Peds: 0.1 mg/kg IM or IN. Max total any route: 8 mg. Run the 6 rights / DICCE before it goes in.",
      o:[{l:"Naloxone, 2\u20134 mg IN \u2014 split between nostrils with the atomizer.",ok:1},{l:"Whatever's in the kit, the whole thing in one nostril.",ok:0},{l:"Squirt it in his mouth.",ok:0}]},
    {q:"It's in. Now:",qV:["It's in. Now:","After the naloxone, you:","Post-administration step:"],teach:"Titrate to BREATHING, not full wakefulness. Reassess in 2\u20133 min, re-dose if needed up to the 8 mg max \u2014 and remember naloxone wears off BEFORE the opioid does, so you keep watching.",
      o:[{l:"Keep ventilating, reassess, re-dose to effect (max 8 mg), keep watching.",ok:1},{l:"Wake him, high-five, clear the call.",ok:0},{l:"Dump the rest of the kit in at once.",ok:0}]}
  ],rayExtra:[
    {q:"Ray's still talking:",qV:["Ray's still talking:","Per Ray's reassessment habit:","Ray wants:"],teach:"Continuous monitoring of respirations and SpO2 after naloxone \u2014 you're watching for the re-sed before it happens.",
      o:[{l:"Continuous SpO2 and respiratory monitoring.",ok:1},{l:"Periodic re-checks are fine.",ok:0}]},
    {q:"And:",qV:["And:","One more from Ray:","Ray's documentation note:"],teach:"Document dose, time, route, response. Re-sed is a forensic question down the line \u2014 you'll thank yourself.",
      o:[{l:"Document dose, time, route, response.",ok:1},{l:"Document at the ED.",ok:0}]}
  ]},
  glucometer:{name:"BLOOD GLUCOSE CHECK",steps:[
    {q:"Set up:",qV:["Set up:","First, before the stick:","Preparation step:"],teach:"BSI first. Strip in the meter, lance the SIDE of a fingertip (less painful, better blood). The first drop can be wiped away.",
      o:[{l:"Glove up, strip in, lance the side of a fingertip.",ok:1},{l:"No gloves, lance the very tip, you're busy.",ok:0},{l:"Squeeze the finger like a stress ball first.",ok:.5}]},
    {q:"The reading comes up: {{bgl}} mg/dL. That is:",qV:["The reading comes up: {{bgl}} mg/dL. That is:","Meter reads {{bgl}} mg/dL. Interpretation?","Result \u2014 {{bgl}} mg/dL. That number means:"],teach:"LA County DHS oral glucose threshold: <60 mg/dL OR suspected hypoglycemia. Over ~250 is hyperglycemia (think DKA \u2014 the LAST thing you give is sugar). Normal range roughly 60\u2013180.",
      o:[{l:"Hypoglycemia \u2014 a true emergency.",ok:(c)=>c.bgl<60?1:0},
         {l:"Hyperglycemia / DKA territory \u2014 handle carefully, NO sugar.",ok:(c)=>c.bgl>250?1:0},
         {l:"Normal-ish, move along.",ok:(c)=>(c.bgl>=60&&c.bgl<=180)?1:0},
         {l:"A solid fuel level.",ok:0}]},
    {q:"Before any sugar goes in, you confirm:",qV:["Before any sugar goes in, you confirm:","Contraindication check before glucose:","Rule out before oral glucose:"],teach:"Oral glucose contraindications (LA County): BGL >60 mg/dL, NO history of diabetes, or patient UNABLE TO SWALLOW. If he can't protect his airway, oral glucose aspirates \u2014 that's a fatal mistake.",
      o:[{l:"He's alert, has a diabetic history, AND can swallow safely.",ok:1},{l:"He's drifting off \u2014 push the paste before he goes out.",ok:0},{l:"Sugar can't hurt, give it either way.",ok:0}]},
    {q:"Now treat. Med safety check (right pt / med / dose / route), then:",qV:["Now treat. Med safety check (right pt / med / dose / route), then:","6 rights / DICCE checked. Treatment:","Treatment for the number you got:"],teach:"Hypo + alert + can swallow \u2192 oral glucose paste between cheek and gum (or assist self-admin), then RECHECK in 10\u201315 min. Hyper \u2192 NO sugar; support, O2, expedite ALS.",
      o:[{l:"Oral glucose paste between cheek and gum, then RECHECK.",ok:(c)=>c.bgl<60?1:0},
         {l:"NO sugar \u2014 support, O2, expedite ALS for likely DKA.",ok:(c)=>c.bgl>250?1:0},
         {l:"An injection of epinephrine.",ok:0},
         {l:"Tell him to eat better and leave.",ok:0}]}
  ],rayExtra:[
    {q:"Ray's not done:",qV:["Ray's not done:","Per Ray's protocol brain:","Ray adds:"],teach:"Always recheck BGL in 10\u201315 minutes after treatment. Treat-and-go is how patients re-crash on the curb.",
      o:[{l:"Recheck BGL in 10\u201315 minutes.",ok:1},{l:"One reading is plenty.",ok:0}]},
    {q:"And:",qV:["And:","Ray's last point:","One more thorough Ray check:"],teach:"Vitals and 'why now?' \u2014 missed insulin, skipped meal, infection. The treatment is glucose; the diagnosis is bigger.",
      o:[{l:"Vitals + 'why now?' history.",ok:1},{l:"Skip the workup, just treat.",ok:0}]}
  ]},
  epi:{name:"EPINEPHRINE AUTO-INJECTOR (ASSIST)",steps:[
    {q:"Confirm before you assist:",qV:["Confirm before you assist:","Indication check:","Before you assist, you need:"],teach:"LA County indications: anaphylaxis, airway swelling, OR severe respiratory distress / bronchospasm (severe asthma). Manage airway + give O2 first, ensure ALS is enroute. Use the patient's own prescribed pen.",
      o:[{l:"Anaphylaxis, airway swelling, OR severe bronchospasm \u2014 and it's his pen.",ok:1},{l:"Any rash counts.",ok:0},{l:"He's anxious, close enough.",ok:0}]},
    {q:"State the med, dose, and route:",qV:["State the med, dose, and route:","Med safety check \u2014 what are you giving?","Dose and route for an adult:"],teach:"Adult: epinephrine 0.3 mg IM, LATERAL thigh. Pediatric: 0.15 mg IM if 15\u201330 kg. Run the 6 rights / DICCE before the click.",
      o:[{l:"Epi 0.3 mg IM, lateral thigh (adult).",ok:1},{l:"Epi 1 mg IV push (ALS — outside BLS scope).",ok:0},{l:"Whatever's on the pen.",ok:0}]},
    {q:"Prep & site:",qV:["Prep & site:","Where does it go and how?","Site & technique:"],teach:"Blue to the sky (cap off), orange to the LATERAL (outer) mid-thigh at 90\u00b0. Goes through clothing. NEVER put a thumb over the orange end \u2014 that's a fingerstick of epi waiting to happen.",
      o:[{l:"Cap off, orange tip 90\u00b0 to the LATERAL thigh.",ok:1},{l:"Into the upper arm.",ok:0},{l:"Thumb over the orange end to test it.",ok:0}]},
    {q:"After the click:",qV:["After the click:","Pen's in. Now:","Post-administration:"],teach:"HOLD for 10 SECONDS (per LA County), then remove and place in a sharps container. Massage the site, high-flow O2, monitor. Symptoms can come ROARING back (biphasic) \u2014 repeat dose after 10 min PRN, max 3 doses total.",
      o:[{l:"Hold 10 sec, sharps the pen, massage, O2, monitor; repeat in 10 min if needed.",ok:1},{l:"Hold ~3 sec and yank it out.",ok:0},{l:"Fire 3 more into him for good measure.",ok:0}]}
  ],rayExtra:[
    {q:"Ray reminds you:",qV:["Ray reminds you:","Per Ray's monitoring habit:","Ray's add-on:"],teach:"Vitals every 5 minutes after epi \u2014 HR, BP, breathing. Epi is potent and patients can have cardiac effects on top of everything else.",
      o:[{l:"Vitals every 5 min, monitor cardiac response.",ok:1},{l:"Pen's in, we're good.",ok:0}]},
    {q:"And finally:",qV:["And finally:","Ray's last note:","One more for Ray:"],teach:"Document the trigger if known. Brief the receiving facility CLEARLY \u2014 the ED and the patient's allergist will both need this.",
      o:[{l:"Document the trigger, brief ED clearly.",ok:1},{l:"They'll figure it out at the ED.",ok:0}]}
  ]}

  {id:"opa",crewCan:false,soloScene:"Your medic's locked up with PD and the second patient \u2014 it's you at the head, and your last hands-on airway was a long time ago.",captainSolo:[{l:"Dig up what you remember \u2014 measure it and place an OPA as best you can.",key:"A",skill:"opa",needs:["opa"],consume:["opa"],saved:true,sc:4,text:"It's not pretty and you second-guess the size twice, but the adjunct seats and he's moving air. Rusty \u2014 but it held, and the crew nods at the old man.",noSupplyText:"You reach for an OPA the rig doesn't have, and you're left holding a jaw-thrust for the duration.",noSupplyTeach:"Unresponsive + no gag is the textbook OPA patient. No adjunct = your hands are stuck.",noSupplySc:-3,noSupplySaved:false,teach:"Even rusty, the right move in a no-gag unresponsive patient is to place the adjunct. Most-correct, not flawless \u2014 that's the captain tax."},{l:"Hold a manual jaw-thrust and wait for a medic to free up.",key:"B",ok:"mid",sc:-3,saved:false,text:"A jaw-thrust isn't wrong \u2014 but you pin both hands indefinitely when a simple adjunct would free you. Not the best answer.",teach:"Manual airway maneuvers are a legitimate stopgap, not a definitive fix when you could place an adjunct. 'Not wrong' isn't 'best.'"},{l:"Step back \u2014 the medics are better at airways than you.",key:"C",ok:"bad",sc:-11,saved:false,text:"They're buried with PD and the other patient. While you defer, his tongue closes the airway. Leadership isn't abdication.",teach:"Knowing your crew is sharper doesn't excuse inaction when they're unavailable and the patient can't wait."}],title:"\u201CFound Down, Bus Bench\u201D",who:"PD ON SCENE",

  {id:"npa",crewCan:false,soloScene:"The crew's hands are full and the jaw's clamped shut. You're kneeling at the airway, and the nasal route is the one you've practiced least.",captainSolo:[{l:"Go nasal \u2014 you THINK it's nostril-to-earlobe \u2014 lube it and place an NPA.",key:"A",skill:"npa",needs:["npa","lube"],consume:["npa","lube"],saved:true,sc:4,text:"You hesitate on the measurement, but you lube it and ease it along the floor of the nose, and the snoring stops. Hedged and rusty \u2014 but correct.",noSupplyText:"No NPA or lube in the bag. You're stuck nursing a mask seal and hoping the jaw relaxes.",noSupplyTeach:"Clenched jaw / intact gag is exactly the NPA's niche \u2014 if you stocked it.",noSupplySc:-3,noSupplySaved:false,teach:"Clenched jaw with reduced LOC = NPA territory. Even unsure, that's the most-correct tool here. Small captain tax for the rust."},{l:"Bag him with a tight mask seal and hold until help frees up.",key:"B",ok:"mid",sc:-3,saved:false,text:"A good two-hand seal buys time \u2014 it's not wrong \u2014 but the obstruction's still there and your hands are pinned. A stopgap, not the answer.",teach:"BVM with a good seal is valid temporizing, but it doesn't relieve the obstruction. The NPA is the better fix."},{l:"Pry the jaw and use the oral airway you remember better.",key:"C",ok:"bad",sc:-10,saved:false,text:"You fight the clamped jaw, trigger a gag, and he vomits. The mouth was a no-go the second it clenched.",teach:"A clenched jaw / intact gag rules OUT the OPA. Defaulting to the tool you 'remember better' is how rust hurts patients."}],title:"\u201CSemi-Conscious, Clenched Jaw\u201D",who:"FAMILY",

  {id:"headinj",crewCan:false,soloScene:"Your medic's on the radio calling a trauma alert and the other crew's packaging. The airway's yours, and something about this guy feels off.",captainSolo:[{l:"Keep it simple \u2014 oral airway and positioning, stay OUT of the nose, treat as trauma.",key:"A",ok:"good",sc:9,saved:true,text:"Something nags at you about the bruised eyes and the runny nose, so you avoid the nasal route, use an oral airway and positioning, and run him as trauma. Right call, even rusty.",teach:"Raccoon eyes + clear nasal fluid = possible basilar skull fracture \u2192 NO NPA. Oral airway/positioning instead. The rust didn't matter; the contraindication did."},{l:"Slide in an NPA \u2014 it's the gentler airway and your hands know it.",key:"B",ok:"bad",sc:-15,saved:false,text:"With a likely basilar skull fracture, the NPA is the ONE airway you must not use. 'The one my hands know' was the trap.",teach:"The classic NPA contraindication is suspected basilar skull fracture / midface trauma. Comfort with a tool never overrides a contraindication."},{l:"You're unsure \u2014 hold manual airway and let the medic decide when free.",key:"C",ok:"mid",sc:-5,saved:false,text:"Deferring on an obvious trauma costs minutes he doesn't have. Manual airway buys a little, but indecision is its own mistake.",teach:"When the signs are this clear (raccoon eyes, CSF), hesitation costs time. Recognize the trauma and act."}],title:"\u201CScooter vs. Curb\u201D",who:"PD ON SCENE",

let S=null; const app=document.getElementById('app');

/* ---- NAV BAR (back / home buttons above the screen) ---- */
let __screen=null;
function setScreen(name){
  __screen=name;
  let nav=document.getElementById('nav');
  let back=document.getElementById('back-btn');
  let home=document.getElementById('home-btn');
  if(!nav||!back||!home) return;
  let showBack=['select','store','confirmStart'].includes(name);
  let showHome=!['title','boot','learn'].includes(name);
  back.style.display = showBack?'inline-block':'none';
  home.style.display = showHome?'inline-block':'none';
  nav.style.display  = (showBack||showHome)?'flex':'none';
}
function navBack(){
  if(__screen==='select') return titleScreen();
  if(__screen==='store') return selectScreen();
  if(__screen==='confirmStart') return storeScreen();
}
function navHome(){
  S=null;
  titleScreen();
}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function render(h){app.innerHTML='<div class="fadein">'+h+'</div>';window.scrollTo(0,0);}

/* Patient demographic + scene randomization for genuine variety every run */
function makeDemo(call){
  let g = call && call.female ? 'f' : 'm';
  let lo = (call && call.ageMin) || 22, hi = (call && call.ageMax) || 65;
  return { age: lo + Math.floor(Math.random()*(hi-lo+1)), male: g==='m' };
}
function applyTokens(str, demo){
  if(!str) return str;
  return str.replace(/\{age\}/g, demo.age);
}
function letterOf(i){ return String.fromCharCode(65+i); }

function newState(cls){
  let inv={}; COUNTS.forEach(k=>inv[k]=0); BOOLS.forEach(k=>inv[k]=false);
  if(CLASSES[cls].flags.improv) inv.strips=1; // Engineer perk
  let alloc=CLASSES[cls].budget + (Math.floor(Math.random()*7)-1)*10; // city deficit roll (skews positive)
  return {cls,flags:CLASSES[cls].flags,mult:CLASSES[cls].mult,budget:alloc,baseAlloc:alloc,inv,
    progress:0,backlog:1,stopCount:0,recent:[],peakHeat:1,current:null,score:0,saved:0,lost:0,

    document.removeEventListener('keydown',skip);

    if(done)return;

    acc+=lines[i].t+'\n';

    fill.style.width=pct+'%';pctEl.textContent=pct+'%';

/* ---- RUSH TIMER (Tiller Killer's "Drill First, Treat Second") ---- */
let __rushInterval=null;
function rushTimerHTML(){
  return S && S.flags && S.flags.rushed
    ? `<div id="rush-bar" class="rush-bar"><span class="lbl">⏱ DRILL OVERRUN — RUSH THE PATIENT</span><span id="rush-num" class="num">15s</span></div>`
    : '';
}
function startRushTimer(onExpire){
  if(!S || !S.flags || !S.flags.rushed) return;
  stopRushTimer();
  let deadline=Date.now()+15000;
  function tick(){
    let remain=Math.max(0,Math.ceil((deadline-Date.now())/1000));
    let num=document.getElementById('rush-num');
    let bar=document.getElementById('rush-bar');
    if(num) num.textContent=remain+'s';
    if(bar){ if(remain<=5) bar.classList.add('warn'); else bar.classList.remove('warn'); }
    if(remain<=0){ stopRushTimer(); onExpire(); }
  }
  tick();
  __rushInterval=setInterval(tick,100);
}
function stopRushTimer(){
  if(__rushInterval){ clearInterval(__rushInterval); __rushInterval=null; }
}
function worstIndex(opts, getOk){
  let worstIdx=0, worstVal=Infinity;
  opts.forEach((o,i)=>{
    let v=getOk(o);
    if(v<worstVal){ worstVal=v; worstIdx=i; }
  });
  return worstIdx;
}
function callOkVal(o){
  if(o.ok==='bad') return -100;
  if(o.ok==='mid') return 0;
  if(o.ok==='good') return 100;
  if(typeof o.ok==='number') return o.ok*100;
  if(o.saved===true) return 50;
  if(o.saved===false) return -50;
  return (o.sc||0);
}
function rushTimeoutCall(){ if(!S._opts) return; pickCall(worstIndex(S._opts, callOkVal)); }
function rushTimeoutDet(){ if(!S._detOpts) return; pickDet(worstIndex(S._detOpts, callOkVal)); }
function rushTimeoutProc(){
  let pr=S.proc; if(!pr) return;
  pickProc(worstIndex(pr.stepOpts, o=>{
    let v=(typeof o.ok==='function')?o.ok(pr.ctx):o.ok;
    return typeof v==='number'?v:0;
  }));
}

/* ---- HIDDEN SPEED TIMER (Ray's "Geological Scene Time") ----
   Fast assessment (<15s) on a question → +1 ★ morale.
   Slow deliberation (>25s) → -1 ★ morale.
   Between 15-25s: no change. Hidden — only the cumulative morale change is shown. */
function startQuestionTimer(){
  if(S && S.flags && S.flags.sceneTime){ S._qStart = Date.now(); }
}
function applyHiddenSpeedTimer(){
  if(!S || !S.flags || !S.flags.sceneTime || !S._qStart) return;
  let elapsed = (Date.now() - S._qStart) / 1000;
  S._qStart = null;
  S._speedFlashes = S._speedFlashes || [];
  if(elapsed < 15){
    if(S.morale < 5){ S.morale = Math.min(5, S.morale + 1); S._speedFlashes.push('fast'); }
  } else if(elapsed > 25){
    if(S.morale > 0){ S.morale = Math.max(0, S.morale - 1); S._speedFlashes.push('slow'); }
  }
}

/* ---- RIPPLE — every action has a downstream consequence ---- */
function applyRipple(r, meta){
  if(!meta || !meta.isCall) return '';
  let tone=r.tone||'mid';
  let pool, chance;
  if(tone==='good' && r.saved===true){ pool=RIPPLES.good; chance=0.55; }
  else if(tone==='bad'){ pool=RIPPLES.bad; chance=0.55; }
  else if(tone==='mid'){ pool=Math.random()<0.5?RIPPLES.good:RIPPLES.bad; chance=0.3; }
  else return '';
  if(Math.random()>chance) return '';
  let ripple=pool[Math.floor(Math.random()*pool.length)];
  S.progress=Math.max(0,Math.min(100,S.progress+(ripple.prog||0)));
  S.backlog=Math.max(0,S.backlog+(ripple.heat||0));
  S.score+=(ripple.sc||0);
  if(ripple.morale && S.flags.morale){
    S.morale=Math.min(5,Math.max(0,S.morale+ripple.morale));
  }
  if(ripple.scav && S.inv){
    let restock=['gloves','strips','glucose','lube'];
    let item=restock[Math.floor(Math.random()*restock.length)];
    S.inv[item]=(S.inv[item]||0)+1;
    S.scavenged=(S.scavenged||0)+1;
  }
  if(ripple.inv && S.inv && S.inv[ripple.inv]>0){
    S.inv[ripple.inv]=Math.max(0,S.inv[ripple.inv]+(ripple.invDelta||0));
  }
  let isGood=pool===RIPPLES.good;
  let cls=isGood?'good':'bad';
  let parts=[];
  if(ripple.prog) parts.push(`${ripple.prog>0?'+':''}${ripple.prog}% home`);
  if(ripple.heat) parts.push(`${ripple.heat>0?'+':''}${ripple.heat} holding`);
  if(ripple.sc) parts.push(`${ripple.sc>0?'+':''}${ripple.sc} pts`);
  let metaStr=parts.length?` (${parts.join(' · ')})`:'';
  return `<p class="small ${cls}">▸ RIPPLE — ${ripple.title}: ${ripple.effect}${metaStr}</p>`;
}
function nextStop(){
  /* hospital re-pick fires first — you just dropped off a patient at the hospital */
  if(S._needsHospitalRoute){
    S._needsHospitalRoute = false;
    return chooseRouteScreen('hospital');
  }
  setScreen('game');
  S.stopCount++;
  /* mid-route re-pick once you cross 50% — change tactics if you want */
  if(S.progress>=50 && !S.routeChanged && S.stopCount>3){
    return chooseRouteScreen(true);
  }
  let skid = skidRowMult();
  /* catastrophe (rare, escalates in Skid Row) */
  if(S.stopCount>4 && !S.catFired && Math.random()<0.05*skid){ S.catFired=true; return renderCata(pickFrom(CATAS)); }
  let m = (S.route&&S.route.mods) || {scav:1,road:1,crew:1,filth:1,barrier:1,empty:1};
  /* probability bands — barriers & filth scale UP in Skid Row, scav scales DOWN */
  let scavP    = 0.07 * m.scav / skid;
  let roadP    = scavP + 0.08 * m.road;
  let emptyP   = roadP + 0.04 * m.empty;
  let crewP    = emptyP + 0.05 * m.crew;
  let filthP   = crewP + 0.05 * m.filth * skid;
  let barrierP = filthP + 0.05 * m.barrier * skid;
  /* exposures scale hard with Skid Row proximity */
  let expoP    = barrierP + 0.06 * (skid-0.6);
  let r=Math.random();
  if(S.stopCount>1){
    if(r<scavP)    return renderScav(pickFrom(SCAVS));
    if(r<roadP)    return renderRoad(pickFrom(ROADS));
    if(r<emptyP)   return renderEmpty(pickFrom(EMPTY));
    if(r<crewP)    return renderCrewCheck(pickFrom(CREWCHECKS));
    if(r<filthP)   return renderFilth(pickFrom(FILTHS));
    if(r<barrierP) return renderBarrier(pickFrom(BARRIERS));
    if(r<expoP)    return renderExposure(pickFrom(EXPOSURES));
  }
  /* Call selection: bias to SKIDCALLS as Skid Row proximity increases.
     Routes with high transport mod (Down Main) lean harder on SKIDCALLS (they're transport-heavy);
     low-transport routes (Around the 5) pull SKIDCALLS less often. */
  let callPool=CALLS;
  let skidCallBias = skid>=1.6?0.7 : skid>=1.35?0.55 : skid>=1.15?0.30 : 0;
  let txMod = (S.route && S.route.mods && S.route.mods.transport) || 1.0;
  skidCallBias = Math.min(0.9, skidCallBias * txMod);
  if(skidCallBias>0 && Math.random()<skidCallBias) callPool=SKIDCALLS;
  let pool=callPool.filter(c=>!S.recent.includes(c.id));
  let call=pickFrom(pool.length?pool:callPool);
  S.recent.push(call.id); if(S.recent.length>3) S.recent.shift();
  renderCall(call);
}
function advance(){
  S.peakHeat=Math.max(S.peakHeat,S.backlog);
  if(S.sick>0){ if(S.justStuck) S.justStuck=false; else { S.sick--; if(S.sick<=0) return sickFailScreen(); } }
  if(S.progress>=100) return winScreen();
  if(S.backlog>=HEAT_CAP) return failScreen();
  nextStop();
}
function hud(){
  let p=Math.min(100,Math.round(S.progress));
  let hot=S.backlog>=HEAT_CAP-2;
  let sickLine = S.sick>0 ? `<span style="color:var(--red)">BBP CLOCK <b style="color:var(--red)">${S.sick}</b></span>` : '';
  let expLine = S.exposed>0 ? `<span style="color:var(--amber)">EXPOSED <b style="color:var(--amber)">${S.exposed}</b></span>` : '';
  let moraleLine = '';
  if(S.flags.morale){
    let t = MORALE_TIERS[S.morale]||MORALE_TIERS[0];
    moraleLine = `<span style="color:${t.color}">MORALE <b style="color:${t.color}">${'★'.repeat(S.morale)}${'☆'.repeat(5-S.morale)} ${t.label}</b></span>`;
  }
  let skid = skidRowMult();
  let skidTag = skid>=1.6 ? `<span style="color:var(--red)">SKID ROW CORE</span>`
              : skid>=1.35 ? `<span style="color:var(--amber)">NEAR QUARTERS</span>`
              : skid>=1.15 ? `<span style="color:var(--amber-dim)">APPROACHING</span>` : '';
  let routeTag = S.route ? `<span>ROUTE <b>${S.route.name}</b></span>` : '';
  return `<div style="text-align:center;font-family:var(--body);font-size:18px;color:var(--amber);margin-bottom:4px;letter-spacing:2px">DISTANCE TO QUARTERS</div>
    <div class="barwrap"><div class="bar" style="width:${p}%"></div></div>
    <div class="hud">
      <span>HOME <b>${p}%</b></span>
      <span style="${hot?'color:var(--red)':''}">HOLDING <b style="${hot?'color:var(--red)':''}">${S.backlog}/${HEAT_CAP}</b></span>
      ${sickLine}
      ${expLine}
      ${moraleLine}
      <span>SAVED <b>${S.saved}</b></span>
      <span style="${S.lost?'color:var(--red)':''}">LOST <b style="${S.lost?'color:var(--red)':''}">${S.lost}</b></span>
      <span>SCORE <b>${S.score}</b></span>
      ${routeTag}
      ${skidTag}</div>
    ${suppliesStrip()}`;
}

/* ---- CALL ---- */
function activeOptions(call){
  if(S.cls==='captain'){
    if(call.crewCan) return captainDelegate(call);
    if(call.captainSolo) return call.captainSolo;
  }
  return call.options;
}
function captainDelegate(call){
  let d=!!call.det;
  return [
    {l:"Direct your crew through it \u2014 run the scene, keep them moving.",key:"A",ok:'good',sc:11,saved:d?null:true,det:d,
      text:`You call it clean \u2014 \u201C${call.direct}\u201D \u2014 and your crew executes while you run the scene and the radio. Morale's high; they move fast for you. This is the captain's actual job.`,
      teach:"A captain's real hands-on tool is leadership: direct trained people, manage the scene. (+scene command, +morale \u2014 the crew works hard for you.)"},
    {l:"Elbow your medic aside and do it yourself.",key:"B",ok:'mid',sc:-4,saved:d?null:true,det:d,
      text:"You muscle in and it sort of works \u2014 but you're rusty, you slow the scene, and the crew trades a look. You didn't need to take the wheel.",
      teach:"Micromanaging a trained crew burns morale and puts rusty hands where sharp ones already were. Delegate the task; own the scene."},
    {l:"Stand back and let the scene sort itself out.",key:"C",ok:'bad',sc:-12,saved:false,
      text:"You hang back with no direction. Medics duplicate each other, nobody owns the airway, the call drifts. Command isn't standing quietly.",
      teach:"Command means clear direction and assignments. A leaderless scene drifts \u2014 absence isn't delegation."}
  ];
}
function renderCall(call){
  S.current=call;
  S._opts=shuffle(activeOptions(call));
  let demo=makeDemo(call);
  let scene = applyTokens(pickFrom(call.sceneVars||[call.scene]), demo);
  let who = pickFrom(call.whoVars||[call.who]);
  let solo = call.soloScene ? applyTokens(pickFrom(call.soloSceneVars||[call.soloScene]), demo) : '';
  let extra=(S.cls==='captain'&&!call.crewCan&&solo)?`<br><br><span class="mid">\u2014 ${solo}</span>`:'';
  let tag=(S.cls==='captain')
    ?(call.crewCan?`<div class="proc-tag">\u{1F451} CAPTAIN \u2014 your crew's got hands on; run the scene</div>`
                  :`<div class="proc-tag">\u{1F451} CAPTAIN \u2014 crew's tied up; this one's on you</div>`):'';
  let btns=S._opts.map((o,i)=>`<button onclick="pickCall(${i})"><span class="key">${letterOf(i)}</span>${o.l}</button>`).join('');
  render(`${hud()}<h1 style="font-size:14px">CALL \u2014 ${call.title}</h1>
    ${tag}
    <div class="scene"><span class="who">\u25B8 ${who}</span>${scene}${extra}</div>
    <p style="color:var(--amber)">${pickFrom(call.qVars||[call.q])}</p>${rushTimerHTML()}${btns}`);
  startRushTimer(rushTimeoutCall);
  startQuestionTimer();
}
function classMod(call,opt,base){
  let sc=base, note="";
  if(opt.skill && S.flags.byBook){ sc+=3; note=" Calm hands, by the book \u2014 the attendant makes it look easy. (+3)"; }
  if(opt.skill&&(opt.skill==='opa'||opt.skill==='npa')&&S.flags.airwayRusty){ sc-=2; note=" The captain's a touch rusty on hands-on airways, but it counts. (\u22122)"; }
  if(call.decision && S.flags.command){ sc+=3; note=" Scene command instinct kicks in. (+3)"; }
  if(call.timeCritical && S.flags.fast){ sc+=3; note=" Lead Foot got you there with time to spare. (+3)"; }
  return {sc,note};
}
function pickCall(i){
  stopRushTimer();
  applyHiddenSpeedTimer();
  let call=S.current, opt=S._opts[i];
  if(opt.skill!==undefined){
    let met = (opt.needs||[]).every(k=> (COUNTS.includes(k)? S.inv[k]>0 : S.inv[k]===true));
    if(!met){
      let saved=(opt.noSupplySaved!==undefined?opt.noSupplySaved:false);
      let tone=saved===false?'bad':'mid';
      showResult({tone:tone,text:opt.noSupplyText,teach:opt.noSupplyTeach||opt.teach,sc:opt.noSupplySc||-4,saved:saved},
        ()=>advance(), gradeMeta(tone,saved));
      return;
    }
    runProcedure(opt.skill, ()=> finalizeCall(call,opt), opt.procCtx||{});
  } else finalizeCall(call,opt);
}
function finalizeCall(call,opt){
  (opt.consume||[]).forEach(k=>{ if(S.inv[k]>0) S.inv[k]--; });
  let m=classMod(call,opt,opt.sc||0);
  let tone=(opt.skill!==undefined?'good':(opt.ok==='good'?'good':opt.ok==='mid'?'mid':'bad'));
  let toDet = (opt.det && call.det);
  let meta = toDet?null:gradeMeta(tone,opt.saved);
  if(meta && opt.skill && S.flags.sceneTime) meta.attendantTax=true;
  showResult({tone:tone, text:opt.text + (m.note?("\n"+m.note):""), teach:opt.teach, sc:m.sc, saved:opt.saved, transport:opt.transport, skillUsed:(opt.skill!==undefined)},
    ()=>{ if(toDet) renderDet(call.det); else advance(); },
    meta);
}
function renderDet(det){
  S._det=det;
  S._detOpts=shuffle(det.options);
  let opts=S._detOpts.map((o,i)=>`<button onclick="pickDet(${i})"><span class="key">${letterOf(i)}</span>${o.l}</button>`).join('');
  let detScene=pickFrom(det.sceneVars||[det.scene]);
  let detQ=pickFrom(det.qVars||[det.q]);
  render(`${hud()}<div class="proc-tag">\u26A1 PATIENT'S CONDITION IS CHANGING</div>
    <div class="scene"><span class="who">\u25B8 ${det.who}</span>${detScene}</div>
    <p style="color:var(--amber)">${detQ}</p>${rushTimerHTML()}${opts}`);
  startRushTimer(rushTimeoutDet);
  startQuestionTimer();
}
function pickDet(i){
  stopRushTimer();
  applyHiddenSpeedTimer();
  let o=S._detOpts[i];
  let tone=o.ok==='good'?'good':o.ok==='mid'?'mid':'bad';
  showResult({tone:tone,text:o.text,teach:o.teach,sc:o.sc,saved:o.saved,transport:o.transport},
    ()=>advance(), gradeMeta(tone,o.saved));
}

/* ---- PROCEDURE RUNNER ---- */
function runProcedure(skill,onDone,ctx){
  let c=ctx||{};
  if(skill==='glucometer'){
    c.bgl = (c.bglType==='high') ? (450+Math.floor(Math.random()*200)) : (32+Math.floor(Math.random()*26));
  }
  let steps = PROC[skill].steps.slice();
  if(S.cls==='attendant' && PROC[skill].rayExtra) steps = steps.concat(PROC[skill].rayExtra);
  S.proc={p:{name:PROC[skill].name,steps},i:0,onDone,fb:null,ctx:c,stepOpts:null,stepI:-1};
  renderProc();
}
function renderProc(){
  let pr=S.proc, step=pr.p.steps[pr.i];
  if(pr.stepI!==pr.i){ pr.stepOpts = shuffle(step.o); pr.stepI = pr.i; }
  let banner = pr.fb? `<div class="banner ${pr.fb.ok? '' : (pr.fb.ok===null?'b-mid':'b-bad')}">
      <span class="${pr.fb.ok?'good':(pr.fb.ok===null?'mid':'bad')}">${pr.fb.ok?'\u2714 ':(pr.fb.ok===null?'\u2248 ':'\u2716 ')}${pr.fb.msg}</span></div>`:'';
  let q = pickFrom(step.qV||[step.q]).replace(/\{\{bgl\}\}/g, pr.ctx.bgl!==undefined?pr.ctx.bgl:'');
  let opts=pr.stepOpts.map((o,i)=>`<button onclick="pickProc(${i})">${letterOf(i)}. ${o.l}</button>`).join('');
  render(`${hud()}<div class="proc-tag">\u{1F527} ${pr.p.name} \u2014 STEP ${pr.i+1}/${pr.p.steps.length}</div>
    ${banner}
    ${(pr.fb&&pr.lastTeach)?`<div class="teach"><span class="lbl">\u{1F4CB} TEACHING POINT</span>${pr.lastTeach}</div>`:''}
    <p style="color:var(--amber)">${q}</p>${rushTimerHTML()}${opts}`);
  startRushTimer(rushTimeoutProc);
  startQuestionTimer();
}
function pickProc(i){
  stopRushTimer();
  applyHiddenSpeedTimer();
  let pr=S.proc, step=pr.p.steps[pr.i], o=pr.stepOpts[i];
  let okRaw = (typeof o.ok==='function') ? o.ok(pr.ctx) : o.ok;
  let gain = okRaw===1?5 : okRaw===.5?1 : -3;
  S.score+=gain;
  pr.fb={ ok:(okRaw===1?true:okRaw===.5?null:false), msg:(okRaw===1?'Correct.':okRaw===.5?'Workable, but not ideal.':'Not quite \u2014 keep going.') };
  pr.lastTeach=step.teach;
  pr.i++;
  if(pr.i<pr.p.steps.length) renderProc();
  else { let done=pr.onDone; S.proc=null; renderProcDone(pr,done); }
}
function renderProcDone(pr,done){
  // show final step feedback briefly then continue to call outcome
  render(`${hud()}<div class="proc-tag">\u{1F527} ${pr.p.name} \u2014 COMPLETE</div>
    <div class="banner ${pr.fb.ok?'':(pr.fb.ok===null?'b-mid':'b-bad')}">
      <span class="${pr.fb.ok?'good':(pr.fb.ok===null?'mid':'bad')}">${pr.fb.ok?'\u2714 ':(pr.fb.ok===null?'\u2248 ':'\u2716 ')}${pr.fb.msg}</span></div>
    <div class="teach"><span class="lbl">\u{1F4CB} TEACHING POINT</span>${pr.lastTeach}</div>
    <div class="center"><button class="start-btn" onclick="window.__cont()">RESULT</button></div>`);
  window.__cont=done;
}

/* ---- ROAD ---- */
function renderRoad(r){
  render(`${hud()}<h1 style="font-size:14px">\u2014 ON THE TRAIL \u2014</h1>
    <div class="scene"><span class="who">\u25B8 ${r.who}</span>${r.title}: ${r.scene}</div>
    <div class="center"><button class="start-btn" onclick="resolveRoadStop()">DEAL WITH IT</button></div>`);
}
function resolveRoadStop(){ let o=resolveRoad(); showResult({tone:o.tone,text:o.text,teach:o.teach,sc:o.sc,saved:null},()=>advance(),gradeMeta(o.tone,null,'road')); }

/* ---- SCAVENGE ---- */
function renderScav(s){
  S._scav=s;
  render(`${hud()}<h1 style="font-size:14px">\u2014 STREET FIND \u2014</h1>
    <div class="scene"><span class="who">\u25B8 ${s.who}</span><b>${s.title}.</b> ${s.scene}</div>
    <button onclick="takeScav(true)"><span class="key">\u271A</span> TAKE IT</button>
    <button onclick="takeScav(false)"><span class="key">\u2715</span> LEAVE IT</button>`);
}
function takeScav(take){
  let s=S._scav;
  if(take){ if(s.qty===true) S.inv[s.item]=true; else S.inv[s.item]+=s.qty; S.scavenged=(S.scavenged||0)+1; }
  showResult({tone:take?'good':'mid',text:take?s.take:s.leave,teach:s.teach,sc:0,saved:null},()=>advance(),gradeMeta('','','scav'));
}

/* ---- RESULT SHELL ---- */
function showResult(r,onContinue,meta){
  /* HALF-ASS ASSESSMENT — Diesel Bolus Dave: workup is bad, but the reflex transport saves them */
  let daveSaved=false;
  if(S && S.flags && S.flags.halfAss && r.saved===false && meta && meta.isCall){
    r.saved=null; daveSaved=true;
  }
  if(r.sc) S.score+=r.sc;
  if(r.saved===true) S.saved++; else if(r.saved===false) S.lost++;
  let feed='';
  if(daveSaved){
    feed += `<p class="small mid">▸ DAVE TRANSPORTS ANYWAY: missed half the workup, but the ED caught it. Patient survives.</p>`;
  }
  if(S && S.flags && S.flags.halfAss && meta && meta.isCall){
    S.score -= 3;
    feed += `<p class="small bad">▸ HALF-ASS ASSESSMENT: −3 pts — you skipped the secondary, again.</p>`;
  }
  if(meta){
    S.progress=Math.max(0,S.progress+meta.prog);
    S.backlog=Math.max(0,S.backlog+meta.heat);
    if(meta.heat<0) feed=`<p class="small good">\u25B8 Scene clear \u2014 you roll toward quarters. (+${meta.prog}% home)</p>`;
    else if(meta.heat>0) feed=`<p class="small bad">\u25B8 DISPATCH: you're tied up \u2014 ${meta.heat} more call${meta.heat>1?'s':''} drop on your screen.</p>`;
    else if(meta.prog>0) feed=`<p class="small mid">\u25B8 Back on the road. (+${meta.prog}% home)</p>`;
    /* MORALE GAIN/LOSS triggers \u2014 easily lost (bad = -2), slower to climb (good = +1) */
    if(S.flags.morale){
      let oldM = S.morale;
      /* Captain "Mood On The Engine": clean save \u2192 +1, bad call \u2192 \u22122 */
      if(S.flags.command){
        if(r.tone==='good' && r.saved===true){
          S.morale = Math.min(5, S.morale + 1);
        } else if(r.tone==='bad'){
          S.morale = Math.max(0, S.morale - 2);
        }
      }
      /* Ray "Geological Scene Time": skills cost morale, snap-clears rebuild */
      if(S.flags.sceneTime && meta && meta.isCall){
        if(r.skillUsed){
          S.morale = Math.max(0, S.morale - 1);
        } else if(r.tone==='good' && r.saved===true){
          S.morale = Math.min(5, S.morale + 1);
        } else if(r.tone==='bad'){
          S.morale = Math.max(0, S.morale - 2);
        }
      }
      /* Announce morale change with the new tier label */
      if(S.morale !== oldM){
        let t = MORALE_TIERS[S.morale]||MORALE_TIERS[0];
        let delta = S.morale - oldM;
        let cls = delta > 0 ? 'good' : 'bad';
        let arrow = delta > 0 ? `+${delta} \u2605` : `${delta} \u2605`;
        feed += `<p class="small ${cls}">\u25B8 MORALE ${arrow} \u2192 ${'\u2605'.repeat(S.morale)}${'\u2606'.repeat(5-S.morale)} <b style="color:${t.color}">${t.label}</b> \u2014 ${t.desc}</p>`;
      }
      /* Apply tier effects per stop (universal \u2014 both Captain and Ray) */
      if(meta){
        let t = MORALE_TIERS[S.morale]||MORALE_TIERS[0];
        if(t.progPerStop && meta.prog > 0){ S.progress = Math.min(100, S.progress + t.progPerStop); }
        if(meta.isCall){
          if(t.scorePerCall){ S.score += t.scorePerCall; }
          if(t.heatPerCall){ S.backlog += t.heatPerCall; }
        }
      }
      /* Ray's hidden speed timer summary (fires after the morale tier block so changes already applied) */
      if(S._speedFlashes && S._speedFlashes.length){
        let fast=S._speedFlashes.filter(f=>f==='fast').length;
        let slow=S._speedFlashes.filter(f=>f==='slow').length;
        if(fast) feed += `<p class="small good">\u25b8 EFFICIENT ASSESSMENT: crew respects the pace. (+${fast} \u2605 morale from fast answers)</p>`;
        if(slow) feed += `<p class="small bad">\u25b8 DELIBERATION: long pauses cost the crew their patience. (\u2212${slow} \u2605 morale from slow answers)</p>`;
        S._speedFlashes = [];
      }
    }
    /* SHORT DIST \u2014 Tiller Killer's "Knows Every Alley" perk */
    if(S.flags.shortDist && meta.prog > 0){
      S.progress = Math.min(100, S.progress + 3);
    }
    if(meta.attendantTax){ S.backlog++; feed+=`<p class="small mid">\u25B8 Ray's thoroughness ate scene time. (+1 holding)</p>`; }
    feed += applyRipple(r, meta);
    if(r.transport && r.saved===true){
      if(S.flags.fast){
        feed+=`<p class="small good">\u25B8 LEAD FOOT: you transported to the hospital and were back on your beat before the gurney cooled \u2014 no distance lost.</p>`;
      } else {
        let lost=Math.min(30,S.progress);
        S.progress=Math.max(0,S.progress-30);
        feed+=`<p class="small bad">\u25B8 TRANSPORT REQUIRED: you drove the patient to the hospital (\u2212${lost}% home). You'll re-pick a route from there.</p>`;
        S._needsHospitalRoute = true;
      }
    }
  }
  let cls=r.tone==='good'?'good':r.tone==='bad'?'bad':'mid';
  let head=r.tone==='good'?'\u2714 GOOD CALL':r.tone==='bad'?'\u2716 THAT WENT BADLY':'\u2248 COULD\u2019VE BEEN CLEANER';
  let teach=r.teach?`<div class="teach"><span class="lbl">\u{1F4CB} TEACHING POINT</span>${r.teach}</div>`:'';
  let scLine=(r.sc)?`<p class="small">${r.sc>0?'+':''}${r.sc} pts</p>`:'';
  window.__cont=onContinue;
  render(`${hud()}<h1 style="font-size:13px" class="${cls}">${head}</h1>
    <p class="${cls}" style="white-space:pre-line">${r.text}</p>${scLine}${feed}${teach}
    <div class="center"><button class="start-btn" onclick="window.__cont()">CONTINUE</button></div>`);
}

/* ---- WIN / FAIL ---- */
function winScreen(){
  setScreen('end');
  let c=CLASSES[S.cls];
  /* ----- SHIFT-REPORT SCORING (Oregon-Trail-style breakdown) ----- */
  let decisions = S.score;                                       // running total from call + skill choices
  let patients  = S.saved*25 - S.lost*30;                        // saved +25 each, lost -30 each
  let speed     = Math.max(0,(16-S.stopCount))*4;                // fewer stops = bigger bonus
  let composure = Math.max(0,(HEAT_CAP-S.peakHeat))*3;           // never got buried = bonus
  let cash      = S.budget;                                      // every $ left = +1 pt (OT remaining-cash)
  let supplyCt  = COUNTS.reduce((n,k)=>n+(S.inv[k]||0),0);       // leftover consumables
  let supplyEq  = BOOLS.reduce((n,k)=>n+(S.inv[k]?1:0),0);       // leftover equipment
  let supplies  = supplyCt*4 + supplyEq*12;
  let scav      = (S.scavenged||0)*5;                            // hunting equivalent
  let expoPenalty = (S.exposed||0)*4;                            // occupational exposures
  let subtotal  = decisions + patients + speed + composure + cash + supplies + scav - expoPenalty;
  let final     = Math.round(subtotal * c.mult);
  let title,blurb;
  if(S.lost===0 && S.peakHeat<=3 && (S.exposed||0)===0){title="CHIEF'S PET";blurb="Made it home clean, fast, lost nobody, came back un-exposed. The probies hate you. Keep it up.";}
  else if(S.lost===0 && (S.exposed||0)<=2){title="SALTY VETERAN";blurb="It got hairy, but everyone made it and so did you. You've seen some things \u2014 and brought a few home.";}
  else if(S.lost<=2){title="SOLID EMT";blurb="A couple rough ones on the way back, but you got the rig to the barn. You'll do.";}
  else{title="PROBIE";blurb="You limped home over a pile of bad calls. Report to the captain's office, bring the protocol book.";}
  let expoBlock = (S.exposed||0)>0 ? `
    <div class="teach" style="text-align:left;border-color:var(--amber)"><span class="lbl">\u{1F9EA} WHAT YOU TOOK HOME</span>
      <span style="color:var(--amber);font-size:18px">${S.expoLog.join(' \u00b7 ')}</span><br><br>
      <span class="small">Total exposures: ${S.exposed} \u2014 score penalty -${expoPenalty}. Decon, shower, document, follow up at occ-health.</span></div>` : '';
  render(`<h1 style="font-size:16px">BACK AT QUARTERS</h1><div class="sub">${c.name} made it to quarters</div>
    <div class="rig" style="color:var(--green-dim)">     ___________________
    |    Q U A R T E R S    |
    |  [=]   [=]   [=]      |
    '-----------------------'</div>
    <div class="hud" style="font-size:11px"><span>STOPS <b>${S.stopCount}</b></span><span>SAVED <b>${S.saved}</b></span>
      <span style="${S.lost?'color:var(--red)':''}">LOST <b style="${S.lost?'color:var(--red)':''}">${S.lost}</b></span><span>PEAK HOLD <b>${S.peakHeat}</b></span>
      ${(S.exposed||0)>0?`<span style="color:var(--amber)">EXPOSED <b style="color:var(--amber)">${S.exposed}</b></span>`:''}</div>
    <div style="border:2px solid var(--amber-dim);background:#1c1710;padding:14px 16px;margin:14px 0">
      <div style="text-align:center;color:var(--amber);letter-spacing:2px;margin-bottom:8px;font-size:20px">\u2014 SHIFT REPORT \u2014</div>
      ${[
        ['Decision points (calls + skills)', decisions, ''],
        ['Patient outcomes ('+S.saved+' saved \u00b7 '+S.lost+' lost)', patients, ''],
        ['Speed home ('+Math.max(0,16-S.stopCount)+' stops under cap)', speed, ''],
        ['Composure (peak hold '+S.peakHeat+'/'+HEAT_CAP+')', composure, ''],
        ['Leftover budget ($'+S.budget+')', cash, ''],
        ['Leftover supplies ('+supplyCt+' units \u00b7 '+supplyEq+' equip)', supplies, ''],
        ['Scavenger finds ('+(S.scavenged||0)+')', scav, ''],
        ...((S.exposed||0)>0 ? [['Occupational exposures ('+S.exposed+')', -expoPenalty, '']] : [])
      ].map(([lbl,val])=>{
        let col=val>0?'var(--green)':val<0?'var(--red)':'var(--green-dim)';
        let sign=val>=0?'+':'';
        return `<div style="display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px dotted var(--green-deep)"><span style="color:var(--ink)">${lbl}</span><span style="color:${col}">${sign}${val}</span></div>`;
      }).join('')}
      <div style="display:flex;justify-content:space-between;padding:8px 0 4px;border-top:1px dashed var(--amber-dim);margin-top:6px;color:var(--amber)">
        <span>SUBTOTAL</span><span>${subtotal}</span></div>
      <div style="display:flex;justify-content:space-between;padding:2px 0;color:var(--amber)">
        <span>${c.name} class multiplier</span><span>\u00d7${c.mult}</span></div>
    </div>
    <h1 style="font-size:32px;color:var(--amber);margin:10px 0">${final}</h1>
    <div class="teach" style="text-align:center"><span class="lbl">\u{1F396} YOUR RANK</span>
      <span style="font-family:var(--pixel);font-size:16px;color:var(--green);line-height:1.6">${title}</span><br><br><span style="color:var(--amber)">${blurb}</span></div>
    ${expoBlock}
    <div class="center"><button class="start-btn" onclick="titleScreen()">RUN IT BACK</button></div>
    <p class="center small" style="margin-top:14px">Different seat, different roll \u2014 the deficit, the calls, the streets, and what you brought home shuffle every run.</p>`);
}
function failScreen(){
  setScreen('end');
  render(`<h1 style="font-size:16px" class="bad">SWALLOWED BY THE SHIFT</h1><div class="sub">you never made it back</div>
    <div class="rig" style="color:var(--red)">  CALLS HOLDING: ${S.backlog}
  [!][!][!][!][!][!][!]
   units stacked... no exit</div>
    <p class="center bad">The holding calls piled up faster than you could clear them. Units are everywhere, patients keep coming, and the rig never sees the barn. The street won.</p>
    <div class="hud" style="font-size:11px"><span>STOPS <b>${S.stopCount}</b></span><span>SAVED <b>${S.saved}</b></span>
      <span style="color:var(--red)">LOST <b style="color:var(--red)">${S.lost}</b></span><span>GOT <b>${Math.round(S.progress)}%</b> home</span></div>
    <div class="teach" style="text-align:center"><span class="lbl">\u{1F4CB} TAKEAWAY</span>
      <span style="color:var(--amber)">Mistakes compound. Each botched call ties you up and stacks another patient \u2014 the way out isn't speed, it's clean calls. Restock smarter and run the basics right.</span></div>
    <div class="center"><button class="start-btn" onclick="titleScreen()">START OVER</button></div>`);
}

/* ---- CREW CHECK / FILTH / BARRIER / CATA ---- */
function renderCrewCheck(cc){
  S._evt=cc;
  let isCpt=S.cls==='captain';
  render(`${hud()}<h1 style="font-size:14px">CREW CHECK</h1>
    ${isCpt?`<div class="proc-tag">\u{1F451} CAPTAIN \u2014 you see what's about to happen</div>`:''}
    <div class="scene"><span class="who">\u25B8 ON SCENE</span>${cc.scene}</div>
    <div class="center"><button class="start-btn" onclick="resolveCrewCheck()">${isCpt?'STEP IN':'WATCH IT UNFOLD'}</button></div>`);
}
function resolveCrewCheck(){
  let cc=S._evt;
  if(S.cls==='captain'){
    showResult({tone:'good',text:cc.correction,teach:cc.teach,sc:8,saved:null},()=>advance(),{prog:8,heat:-1});
  } else {
    showResult({tone:'bad',text:cc.error,teach:cc.teach,sc:-7,saved:null},()=>advance(),{prog:0,heat:2});
  }
}
function renderFilth(f){
  S._evt=f;
  let has=S.cls==='engineer';
  render(`${hud()}<h1 style="font-size:14px">CONTAMINATION</h1>
    ${has?`<div class="proc-tag">\u{1F527} ENGINEER \u2014 you've got tank water</div>`:''}
    <div class="scene"><span class="who">\u25B8 ON SCENE</span><b>${f.title}.</b> ${f.scene}</div>
    <div class="center"><button class="start-btn" onclick="resolveFilth()">${has?'HOSE IT DOWN':'DEAL WITH IT'}</button></div>`);
}
function resolveFilth(){
  let f=S._evt, has=S.cls==='engineer';
  if(has){
    showResult({tone:'good',text:f.fixText,teach:f.teach,sc:6,saved:null},()=>advance(),{prog:6,heat:-1});
  } else {
    showResult({tone:'bad',text:f.noFixText,teach:f.teach,sc:-5,saved:null},()=>advance(),{prog:0,heat:1});
  }
}
function renderBarrier(b){
  S._evt=b;
  let has=S.cls==='ao';
  render(`${hud()}<h1 style="font-size:14px">LOCKED ACCESS</h1>
    ${has?`<div class="proc-tag">\u{1FA9C} APPARATUS OP \u2014 forcible entry is your job</div>`:''}
    <div class="scene"><span class="who">\u25B8 ON SCENE</span><b>${b.title}.</b> ${b.scene}</div>
    <div class="center"><button class="start-btn" onclick="resolveBarrier()">${has?'POP IT OPEN':'WAIT ON THE TRUCK'}</button></div>`);
}
function resolveBarrier(){
  let b=S._evt, has=S.cls==='ao';
  if(has){
    showResult({tone:'good',text:b.feText,teach:b.teach,sc:9,saved:null},()=>advance(),{prog:9,heat:-1});
  } else {
    showResult({tone:'bad',text:b.noFeText,teach:b.teach,sc:-8,saved:false},()=>advance(),{prog:0,heat:2});
  }
}
function renderCata(c){
  S._evt=c;
  let head=c.kind==='steal'?'\u26A0 RIG BORROWED \u26A0':'\u26A0 SHARPS \u26A0';
  render(`${hud()}<h1 style="font-size:14px;color:var(--red)">${head}</h1>
    <div class="scene"><span class="who">\u25B8 SUDDEN</span><b>${c.title}.</b> ${c.scene}</div>
    <div class="center"><button class="start-btn" onclick="resolveCata()">PROCEED</button></div>`);
}
function resolveCata(){
  let c=S._evt;
  if(c.kind==='steal'){
    S.progress=0;
    showResult({tone:'bad',text:"You walk the long way back to S&M to grab another rig. Everything you built on this trip \u2014 gone. Distance to quarters: 0%.",teach:"Lock the rig. Always. The Skid Row rig-theft genre has plot twists nobody enjoys.",sc:-5,saved:null},()=>advance());
  } else {
    S.sick=6; S.justStuck=true;
    showResult({tone:'bad',text:"You document the exposure and keep working \u2014 but you've got a clock now. Make quarters in time and the ED has you covered. Stall, and you're the next patient.",teach:"Needle sticks happen on Skid Row. Post-exposure prophylaxis exists, but the clock starts the second of contact \u2014 sooner is better.",sc:-3,saved:null},()=>advance());
  }
}
function sickFailScreen(){
  setScreen('end');
  render(`<h1 style="font-size:16px" class="bad">DOWN ON THE TRAIL</h1><div class="sub">you didn't make it back in time</div>
    <div class="rig" style="color:var(--red)">    ___________________
    |   E D   T R I A G E   |
    |   too late...         |
    '-----------------------'</div>
    <p class="center bad">The exposure caught up before quarters did. You went from EMT to patient on the same shift.</p>
    <div class="hud" style="font-size:11px"><span>STOPS <b>${S.stopCount}</b></span><span>GOT <b>${Math.round(S.progress)}%</b> home</span></div>
    <div class="teach" style="text-align:center"><span class="lbl">\u{1F4CB} TAKEAWAY</span>
      <span style="color:var(--amber)">Treat every sharps and bodily-fluid exposure like a clock. Skid Row's needles don't care about your shift.</span></div>
    <div class="center"><button class="start-btn" onclick="titleScreen()">START OVER</button></div>`);
}

bootScreen();
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').catch(()=>{});});}
</script>
</body>
</html>
